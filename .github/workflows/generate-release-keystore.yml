name: Generate Android Release Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate keystore
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          keytool -genkeypair \
            -v \
            -keystore keystore.jks \
            -storepass "$SIGNING_STORE_PASSWORD" \
            -alias "$SIGNING_KEY_ALIAS" \
            -keypass "$SIGNING_KEY_PASSWORD" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=SMSGate Jaib Filter,O=Private,C=YE"

          base64 -w 0 keystore.jks > keystore.jks.base64.txt

      - name: Upload keystore artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-keystore-private
          path: |
            keystore.jks
            keystore.jks.base64.txt
